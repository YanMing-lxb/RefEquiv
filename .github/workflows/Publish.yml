name: Publish RefEquiv

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install project
        run: uv sync --dev

      - name: Build executable
        run: |
          cd ${{ github.workspace }}
          uv run tools/pack.py

      - name: List dist directory
        run: dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: RefEquiv-executable
          path: dist/RefEquiv.exe

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download executable
        uses: actions/download-artifact@v8
        with:
          name: RefEquiv-executable
          path: dist/

      - name: Verify files
        run: ls -la dist/

      - name: Extract tag name
        id: extract_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Generate changelog
        run: |
          if [ -f "${{ github.workspace }}/CHANGELOG.md" ]; then
            changelog=$(cat ${{ github.workspace }}/CHANGELOG.md)
            tag_name=${{ env.TAG_NAME }}
            version_header="## $tag_name"
            if [[ $changelog == *"$version_header"* ]]; then
              version_content=$(echo "$changelog" | awk -v version_header="$version_header" '
                /^## / { if (p) exit; p=0 }
                $0 ~ version_header { p=1; next }
                p')
              echo "$version_content"
            else
              echo "Version $tag_name not found in CHANGELOG.md"
            fi
            echo "$version_content" > ${{ github.workspace }}-CHANGELOG.txt
          else
            echo "No CHANGELOG.md found, using default message" > ${{ github.workspace }}-CHANGELOG.txt
            echo "RefEquiv $tag_name Release" >> ${{ github.workspace }}-CHANGELOG.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ github.workspace }}-CHANGELOG.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          name: RefEquiv ${{ env.TAG_NAME }}
          files: |
            dist/RefEquiv.exe
